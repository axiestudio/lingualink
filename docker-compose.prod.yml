# LinguaLink Fullstack Production Docker Compose
# AS A SENIOR DEVELOPER - Single container fullstack deployment

version: '3.8'

services:
  # LinguaLink Fullstack Service
  lingualink:
    image: axiestudio/lingualink:latest
    container_name: lingualink-fullstack
    restart: unless-stopped
    ports:
      - "80:3000"    # Frontend (mapped to port 80)
      - "8000:8000"  # Backend API
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - FEATHERLESS_API_KEY=${FEATHERLESS_API_KEY}
      - NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    networks:
      - lingualink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Redis Cache (Optional - for session storage)
  redis:
    image: redis:7-alpine
    container_name: lingualink-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lingualink-network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  redis-data:
    driver: local

networks:
  lingualink-network:
    driver: bridge
